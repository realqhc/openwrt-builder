name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  #  release:
  #    types: published
  #  push:
  #    branches:
  #      - master
  #    paths:
  #      - 'x86.config'
  schedule:
    - cron: 10 1 */15 * *
#  watch:
#    types: started

env:
  REPO_URL: https://gh-proxy.com/github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  SSH_ACTIONS: false
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  USER: ubuntu
  

jobs:
  build_openwrt:
    strategy:
      matrix:
        config_file: [acrh17.config, x86.config, mt6000.config]
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: 'Cleanup build folder'
        run: |
          ls -la ./
          rm -rf ./* || true
          rm -rf ./.??* || true
          ls -la ./

      - name: Checkout
        uses: realqhc/checkout@main

      - name: Initializing environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # I know it is bad but it is under systemd-nspawn
          export FORCE_UNSAFE_CONFIGURE=1
          sudo -E apt-get -qq update && sudo apt-get -qq upgrade
          sudo apt-get -qq autoremove --purge
          sudo apt-get -qq clean

      - name: Clone source code
        run: |
          df -hT
          ln -sf /home/${{ env.USER }}/build/openwrt $GITHUB_WORKSPACE/openwrt
          cd openwrt && git fetch --all && git reset --hard origin/main

      - name: Load custom feeds
        run: |
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH
          mv $GITHUB_WORKSPACE/projectsmirrors.json ./scripts/

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e ${{ matrix.config_file }} ] && mv ${{ matrix.config_file }} openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)

      - name: Compile the firmware
        id: compile
        run: |
          # use proxy for golang
          export GOPROXY=https://goproxy.cn,direct
          export TAR_OPTIONS=--no-same-owner
          cd openwrt
          echo -e "$(nproc) thread compile"
          FORCE_UNSAFE_CONFIGURE=1 make -j$(nproc) clean world || FORCE_UNSAFE_CONFIGURE=1 make -j1 || FORCE_UNSAFE_CONFIGURE=1 make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      # - name: Upload bin directory
      #   uses: realqhc/upload-artifact@main
      #   if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      #   with:
      #     name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
      #     path: openwrt/bin

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/$(grep -m 1 '^CONFIG_TARGET.*=y' openwrt/.config | sed -r 's/.*TARGET_(.*)=y/\1/')/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: realqhc/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: realqhc/action-gh-release@master
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ matrix.config_file }}-${{ steps.tag.outputs.release_tag }}
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: realqhc/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 6

      - name: Remove old Releases
        uses: realqhc/delete-release-action@master
        with:
          release-drop: true
          release-keep-count: 6
          release-drop-tag: true
          pre-release-drop: true
          pre-release-keep-count: -1
          pre-release-drop-tag: true
          draft-drop: true
          draft-drop-count: -1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
