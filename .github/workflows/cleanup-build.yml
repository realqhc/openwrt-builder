name: Cleanup Build Folder

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: 30 03 01 */3 *
env:
  USER: ubuntu
jobs:
  cleanup:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: 'Cleanup openwrt folder'
        run: |
          export FORCE_UNSAFE_CONFIGURE=1
          cd /home/${{ env.USER }}/build/openwrt
          make distclean
